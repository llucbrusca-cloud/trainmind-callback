<!DOCTYPE html>
<html>
<head>

</head>
<body>
  <p>Conectando con Strava, espera un momento...</p>

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    if (code && state) {
      window.location.href = 'trainmindai://callback?code=' + code + '&userId=' + state;
    }
  </script>
</body>
</html>
